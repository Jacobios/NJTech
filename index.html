<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="南京工业大学新生攻略 - 学长学姐整理的入学必看指南，涵盖报到、军训、学习、生活、吃喝玩乐全攻略" />
  <meta name="keywords" content="南京工业大学,新生攻略,入学指南,南工大,新生必备,NJTech" />
  <meta name="theme-color" content="#1a6fb5" />
  <meta property="og:title" content="南工大新生必看攻略" />
  <meta property="og:description" content="学长整理的南京工业大学新生入学全方位指南" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <title>南工大新生必看攻略 | 学长整理</title>
  <style>
    /* 骨架屏 - 首屏秒开 */
    body { margin:0; background:#f5f7fa; }
    #app { min-height:100vh; }
    .skeleton { padding:16px; }
    .skeleton-header { height:200px; background:linear-gradient(135deg,#1a6fb5,#2196F3); border-radius:0 0 24px 24px; animation:pulse 1.5s infinite; }
    .skeleton-card { height:80px; background:#fff; border-radius:12px; margin:12px 0; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
  </style>
</head>
<body>
  <div id="app">
    <div class="skeleton">
      <div class="skeleton-header"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card" style="animation-delay:0.2s"></div>
      <div class="skeleton-card" style="animation-delay:0.4s"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
